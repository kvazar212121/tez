<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Yo‘lovchi">
  <defs>
    <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="ps" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>
  <circle cx="24" cy="21" r="17" fill="url(#pg)" filter="url(#ps)"/>
  <circle cx="24" cy="21" r="16" fill="none" stroke="#fff" stroke-width="1.75" opacity="0.92"/>
  <!-- Kichik odamcha: o‘ng qo‘lni silkitab -->
  <g fill="none" stroke="#fff" stroke-linecap="round" stroke-linejoin="round">
    <!-- bosh -->
    <circle cx="24" cy="13.8" r="3.6" fill="#fff" stroke="none"/>
    <!-- tananing yuqori qismi -->
    <path stroke-width="2.15" d="M24 17.4v9.2"/>
    <!-- oyoqlar -->
    <path stroke-width="2.15" d="M24 26.6l-4.2 8"/>
    <path stroke-width="2.15" d="M24 26.6l4.2 8"/>
    <!-- chap qo‘l (yon tomonda) -->
    <path stroke-width="1.95" d="M23 18.8l-6.5 2.8"/>
    <!-- o‘ng qo‘l — yuqoriga cho‘zilgan (salom) -->
    <path stroke-width="1.95" d="M25 18.2l9-10.5"/>
    <!-- qo‘l uchidagi “doira” -->
    <circle cx="35.2" cy="6.8" r="2" fill="#fff" stroke="none"/>
    <!-- silkitish chiziqlari -->
    <path stroke-width="1.5" d="M37.5 4.2l2.4-1.3" opacity="0.9"/>
    <path stroke-width="1.5" d="M38.2 7.1l2.6-.4" opacity="0.85"/>
    <path stroke-width="1.4" d="M37.8 9.8l2.2 1" opacity="0.75"/>
  </g>
</svg>
